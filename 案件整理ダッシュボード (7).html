<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件整理ダッシュボード</title>
<style>
  :root{
    --navy:#1f3a5f; --navy-light:#2e5c8a; --accent:#3b8ea5;
    --bg:#f4f6f8; --card:#ffffff; --border:#dde3e8;
    --text:#2c3338; --text-soft:#6b7480; --done:#9aa6b2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

  header{
    background:var(--navy);color:#fff;padding:12px 16px;
    display:flex;flex-wrap:wrap;align-items:center;gap:10px;
    position:sticky;top:0;z-index:10;
  }
  header h1{font-size:17px;margin:0;font-weight:700;white-space:nowrap;}
  .phase-selector{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
  .phase-btn{
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.25);
    color:#fff;font-size:12px;padding:5px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .phase-btn:hover{background:rgba(255,255,255,0.18);}
  .phase-btn.active{background:var(--accent);border-color:var(--accent);font-weight:700;}
  .reset-btn{background:#e3664a;border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:6px;cursor:pointer;white-space:nowrap;}
  .reset-btn:hover{background:#cf5236;}

  main{display:flex;gap:14px;padding:16px;max-width:1400px;width:100%;margin:0 auto;align-items:flex-start;}
  .left{flex:3;min-width:0;display:flex;flex-direction:column;gap:12px;}
  .side-panel{flex:1.3;min-width:270px;display:flex;flex-direction:column;gap:12px;position:sticky;top:72px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .card-title{
    font-size:13px;font-weight:700;color:var(--navy-light);margin:0 0 2px;
    display:flex;align-items:center;gap:8px;
  }
  .badge{font-size:11px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 8px;font-weight:700;}
  .progress-track{height:4px;background:var(--border);border-radius:3px;margin:6px 0 10px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .2s;}

  ul.cl{list-style:none;margin:0;padding:0;}
  ul.cl ul.cl{padding-left:20px;margin-top:2px;}
  .ci{display:flex;align-items:flex-start;gap:7px;padding:3px 4px;border-radius:5px;cursor:pointer;font-size:13px;}
  .ci:hover{background:#eef2f6;}
  .ci .box{flex:none;width:15px;height:15px;margin-top:3px;border:2px solid #b9c2cb;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;}
  .ci.checked .box{background:var(--accent);border-color:var(--accent);}
  .ci .box svg{display:none;width:9px;height:9px;}
  .ci.checked .box svg{display:block;}
  .ci .lbl{flex:1;}
  .ci.checked .lbl{color:var(--done);text-decoration:line-through;}

  /* choice / yesno */
  .choice-item{padding:4px 4px 6px;}
  .choice-label{font-size:13px;margin-bottom:5px;font-weight:600;color:var(--navy);}
  .choice-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
  .c-btn{border:1px solid var(--border);background:#fff;border-radius:6px;padding:4px 13px;font-size:12.5px;cursor:pointer;color:var(--text-soft);font-weight:700;transition:background .15s;}
  .c-btn:hover{background:#eef2f6;}
  .c-btn.active{background:var(--navy-light);color:#fff;border-color:var(--navy-light);}
  .c-btn.yes-btn.active{background:var(--accent);border-color:var(--accent);}
  .c-btn.no-btn.active{background:#e3664a;border-color:#e3664a;}
  .choice-body{display:none;padding-left:4px;margin-top:4px;}
  .choice-body.open{display:block;}
  .yn-note{font-size:12px;background:#f1f5f8;border-left:3px solid var(--accent);padding:6px 8px;border-radius:0 6px 6px 0;color:var(--text);display:none;margin-top:4px;}

  .note{font-size:12px;color:var(--text-soft);background:#f1f5f8;border-left:3px solid var(--accent);padding:7px 9px;border-radius:0 6px 6px 0;margin-top:8px;}

  /* tabs */
  .tabs{display:flex;gap:5px;}
  .tab-btn{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 5px;font-size:12px;font-weight:700;color:var(--text-soft);cursor:pointer;}
  .tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  .phase-def-panel{
    max-height: calc(100vh - 140px);
    overflow-y: auto;
    font-size:12px;
  }
  .phase-def-section{margin-bottom:14px;}
  .phase-def-title{
    font-size:12.5px;font-weight:700;color:var(--navy-light);
    padding:5px 8px;background:#eef2f6;border-radius:5px;margin-bottom:4px;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
  }
  .phase-def-title:hover{background:#dde8f0;}
  .phase-def-title.active-phase{background:var(--accent);color:#fff;}
  .phase-def-choice{
    font-size:11.5px;font-weight:700;color:var(--accent);
    margin:4px 0 2px;
  }
  .phase-def-opt{
    font-size:11.5px;color:var(--text-soft);padding:1px 4px 1px 12px;
  }

  table.ref{width:100%;border-collapse:collapse;font-size:12px;}
  table.ref th,table.ref td{border:1px solid var(--border);padding:5px 7px;text-align:left;vertical-align:top;}
  table.ref th{background:#eef2f6;color:var(--navy);font-weight:700;font-size:11px;}

  @media(max-width:900px){main{flex-direction:column;}.side-panel{position:static;width:100%;}}
</style>
</head>
<body>
<header>
  <h1>案件整理チェックリスト</h1>
  <div class="phase-selector" id="phaseSelector"></div>
  <button class="reset-btn" id="nextCase">次の案件へ ↻</button>
</header>

<main>
  <div class="left">

    <!-- ① フェーズ確認 -->
    <div class="card">
      <div class="card-title">① フェーズの確認（マネージャー） <span class="badge" id="p1prog">0/0</span></div>
      <div class="progress-track"><div class="progress-fill" id="p1fill"></div></div>
      <ul class="cl" id="p1list"></ul>
    </div>

    <!-- ② フェーズ別確認事項 -->
    <div class="card">
      <div class="card-title">② フェーズ別確認事項 <span id="phaseName" style="color:var(--accent);font-size:12px;"></span> <span class="badge" id="p2prog">0/0</span></div>
      <div class="progress-track"><div class="progress-fill" id="p2fill"></div></div>
      <div id="phaseBody"></div>
    </div>

    <!-- ③ KV更新状況 -->
    <div class="card">
      <div class="card-title">③ RAM案件の場合：KV更新状況（マネージャー） <span class="badge" id="p3prog">0/0</span></div>
      <div class="progress-track"><div class="progress-fill" id="p3fill"></div></div>
      <ul class="cl" id="p3list"></ul>
    </div>

    <!-- ④ 完了予定日 -->
    <div class="card">
      <div class="card-title">④ 案件の完了予定日の確認（マネージャー） <span class="badge" id="p4prog">0/0</span></div>
      <div class="progress-track"><div class="progress-fill" id="p4fill"></div></div>
      <ul class="cl" id="p4list"></ul>
    </div>

  </div>

  <aside class="side-panel">
    <div class="tabs">
      <button class="tab-btn active" data-tab="phasedef">フェーズ定義</button>
      <button class="tab-btn" data-tab="reminder">催促</button>
      <button class="tab-btn" data-tab="trans">移行条件</button>
    </div>
    <div class="card tab-content active" data-tab="phasedef" style="padding:12px;">
      <div class="card-title" style="margin-bottom:8px;">フェーズ別確認事項 一覧</div>
      <div class="phase-def-panel" id="phaseDefPanel"></div>
    </div>
    <div class="card tab-content" data-tab="reminder">
      <div class="card-title">催促ルール一覧</div>
      <table class="ref" id="reminderTable"></table>
    </div>
    <div class="card tab-content" data-tab="trans">
      <div class="card-title">フェーズ移行条件</div>
      <table class="ref" id="transTable"></table>
    </div>
  </aside>
</main>

<script>

/* ======== RENDER ======== */

function renderSimpleList(items, listEl, idArr){
  items.forEach(text => {
    const id = nid(); idArr.push(id);
    const li = document.createElement('li');
    const row = document.createElement('div');
    row.className='ci'; row.dataset.id=id;
    row.innerHTML=`<span class="box">${CHK}</span><span class="lbl">${text}</span>`;
    row.addEventListener('click',()=>toggle(id));
    li.appendChild(row);
    listEl.appendChild(li);
  });
}

function renderItems(items, container, idArr){
  const ul = document.createElement('ul'); ul.className='cl';
  items.forEach(item => {
    const li = document.createElement('li');
    if(typeof item === 'string'){
      const id = nid(); idArr.push(id);
      const row = document.createElement('div');
      row.className='ci'; row.dataset.id=id;
      row.innerHTML=`<span class="box">${CHK}</span><span class="lbl">${item}</span>`;
      row.addEventListener('click',()=>toggle(id));
      li.appendChild(row);
    } else if(item.type==='choice'){
      const id = nid(); idArr.push(id);
      li.dataset.id=id;
      const wrap = document.createElement('div'); wrap.className='choice-item';
      const lbl = document.createElement('div'); lbl.className='choice-label'; lbl.textContent=item.text;
      const btns = document.createElement('div'); btns.className='choice-btns';
      item.options.forEach((opt,i)=>{
        const btn=document.createElement('button'); btn.className='c-btn'; btn.textContent=opt.label; btn.type='button';
        btn.addEventListener('click',()=>selectChoice(id,i,item.options,idArr));
        btns.appendChild(btn);
      });
      wrap.appendChild(lbl); wrap.appendChild(btns);
      item.options.forEach((opt,i)=>{
        const body=document.createElement('div'); body.className='choice-body'; body.dataset.cid=id; body.dataset.idx=i;
        if(opt.items && opt.items.length>0) renderItems(opt.items,body,idArr);
        wrap.appendChild(body);
      });
      li.appendChild(wrap);
    } else if(item.type==='yesno'){
      const id = nid(); idArr.push(id);
      yesnoData[id]={yes:item.yes,no:item.no};
      li.dataset.id=id;
      const wrap=document.createElement('div'); wrap.className='choice-item';
      const lbl=document.createElement('div'); lbl.className='choice-label'; lbl.textContent=item.text;
      const btns=document.createElement('div'); btns.className='choice-btns';
      ['はい','いいえ'].forEach(v=>{
        const btn=document.createElement('button'); btn.className='c-btn '+(v==='はい'?'yes-btn':'no-btn'); btn.textContent=v; btn.type='button';
        btn.addEventListener('click',()=>setYN(id,v));
        btns.appendChild(btn);
      });
      const note=document.createElement('div'); note.className='yn-note'; note.dataset.ynid=id;
      wrap.appendChild(lbl); wrap.appendChild(btns); wrap.appendChild(note);
      li.appendChild(wrap);
    }
    ul.appendChild(li);
  });
  container.appendChild(ul);
}

function selectChoice(id, idx, options, idArr){
  state[id]=idx;
  // update buttons
  const li = document.querySelector(`li[data-id="${id}"]`);
  if(!li) return;
  li.querySelectorAll('.c-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  // show/hide bodies
  document.querySelectorAll(`.choice-body[data-cid="${id}"]`).forEach(body=>{
    body.classList.toggle('open', parseInt(body.dataset.idx)===idx);
  });
  updateProgress();
}

function setYN(id, val){
  state[id]=val;
  const li=document.querySelector(`li[data-id="${id}"]`);
  if(!li)return;
  li.querySelectorAll('.c-btn').forEach(b=>{
    b.classList.toggle('active',(val==='はい'&&b.classList.contains('yes-btn'))||(val==='いいえ'&&b.classList.contains('no-btn')));
  });
  const note=document.querySelector(`.yn-note[data-ynid="${id}"]`);
  if(note){note.innerHTML=(val==='はい'?yesnoData[id].yes:yesnoData[id].no).replace(/\n/g,'<br>');note.style.display='block';}
  updateProgress();
}

function toggle(id){
  state[id]=!state[id];
  const el=document.querySelector(`.ci[data-id="${id}"]`);
  if(el) el.classList.toggle('checked',state[id]);
  updateProgress();
}

function updateProgress(){
  function calc(ids){ return ids.filter(id=>state[id]).length; }
  function set(doneEl,fillEl,done,total){
    document.getElementById(doneEl).textContent=done+'/'+total;
    document.getElementById(fillEl).style.width=(total?done/total*100:0)+'%';
  }
  set('p1prog','p1fill',calc(p1Ids),p1Ids.length);
  set('p2prog','p2fill',calc(p2Ids),p2Ids.length);
  set('p3prog','p3fill',calc(p3Ids),p3Ids.length);
  set('p4prog','p4fill',calc(p4Ids),p4Ids.length);
}

function renderPhase(num){
  const ph=PHASES[num];
  p2Ids=[];
  document.getElementById('phaseName').textContent=ph.title;
  const body=document.getElementById('phaseBody');
  body.innerHTML='';
  renderItems(ph.items,body,p2Ids);
  if(ph.note){ const n=document.createElement('div'); n.className='note'; n.textContent=ph.note; body.appendChild(n); }
  updateProgress();
}

function buildPhaseDefPanel(){
  const panel=document.getElementById('phaseDefPanel');
  for(let i=1;i<=11;i++){
    const ph=PHASES[i];
    const sec=document.createElement('div'); sec.className='phase-def-section';

    const title=document.createElement('div');
    title.className='phase-def-title'; title.dataset.phase=i;
    title.textContent=ph.title;

    const body=document.createElement('div'); body.style.cssText='padding:4px 0 8px 4px;';
    body.dataset.defbody=i;
    if(PHASE_DEFS[i]){
      PHASE_DEFS[i].forEach(def=>{
        const d=document.createElement('div');
        d.style.cssText='font-size:12px;color:var(--text);padding:3px 0 3px 8px;border-left:2px solid var(--accent);margin:3px 0;';
        d.textContent='・'+def; body.appendChild(d);
      });
    }

    sec.appendChild(title); sec.appendChild(body);
    panel.appendChild(sec);
  }
}

// フェーズ選択時にサイドパネルの該当フェーズをハイライト
function highlightDefPhase(num){
  document.querySelectorAll('.phase-def-title').forEach(t=>{
    t.classList.toggle('active-phase', parseInt(t.dataset.phase)===num);
  });
}

function buildPhaseSelector(){
  const sel=document.getElementById('phaseSelector');
  for(let i=1;i<=11;i++){
    const btn=document.createElement('button'); btn.className='phase-btn'+(i===1?' active':''); btn.textContent=PHASES[i].title; btn.dataset.p=i;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.phase-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderPhase(i);
      highlightDefPhase(i);
    });
    sel.appendChild(btn);
  }
}

function buildTable(el,rows,headers){
  let h='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  rows.forEach(r=>{ h+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; });
  document.getElementById(el).innerHTML=h;
}

/* ======== INIT ======== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.querySelector(`.tab-content[data-tab="${btn.dataset.tab}"]`).classList.add('active');
  });
});

document.getElementById('nextCase').addEventListener('click',()=>{
  state={}; yesnoData={};
  document.querySelectorAll('.ci.checked').forEach(e=>e.classList.remove('checked'));
  document.querySelectorAll('.c-btn.active').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.choice-body.open').forEach(e=>e.classList.remove('open'));
  document.querySelectorAll('.yn-note').forEach(e=>{e.style.display='none';e.textContent='';});
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
});

updateProgress();
